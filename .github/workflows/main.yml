name: Revert
on: [push]
jobs:
  fix:
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: 🛡️ Revert
        env:
          BEFORE_SHA: ${{ github.event.before }}
          TARGET_BRANCH: ${{ github.ref_name }}
        run: |
          if [[ "$BEFORE_SHA" == "0000000000000000000000000000000000000000" || -z "$BEFORE_SHA" ]]; then exit 1; fi
          git config user.name "bot"; git config user.email "bot@bot.com"
          git fetch origin $TARGET_BRANCH --unshallow || git fetch origin $TARGET_BRANCH
          git checkout $TARGET_BRANCH
          if git revert --no-edit $BEFORE_SHA..HEAD; then
            git push origin $TARGET_BRANCH --force-with-lease
          else
            git reset --hard $BEFORE_SHA
            git push origin $TARGET_BRANCH --force
          fi
